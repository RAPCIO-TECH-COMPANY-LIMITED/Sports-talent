upstream django_app {
    server web:8000;
}

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name playersystem.org www.playersystem.org;
    return 301 https://$host$request_uri;
}

# Handle HTTPS traffic
server {
    listen 443 ssl;
    server_name playersystem.org www.playersystem.org;

    # SSL Certificates (Provided by Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/playersystem.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playersystem.org/privkey.pem;

    client_max_body_size 20M;

    # Handle Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Handle Media Files
    location /media/ {
        alias /app/media/;
    }

    # Pass requests to Gunicorn
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
