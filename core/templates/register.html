{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8 border-t-4 border-purple-700 mt-10">
    <h2 class="text-3xl font-bold text-center text-black mb-2">Create Account</h2>
    <p class="text-center text-gray-600 mb-6 text-sm">Register to manage academies and players</p>

    <form method="post" class="space-y-2">
        {% csrf_token %}

        <div class="text-gray-800">
            {{ form.as_p }}
        </div>

        <button type="submit" class="w-full py-3 bg-black text-white rounded-md hover:bg-gray-800 font-bold shadow transition mt-6">
            Register Account
        </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
        Already have an account? <a href="{% url 'login' %}" class="text-purple-700 font-bold hover:underline">Log in</a>.
    </p>
</div>
{% endblock %}
