<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Management System</title>
    <!-- Using Tailwind CSS for quick, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sky Sports Aesthetic: Sharp, bold, high-contrast forms */
        .form-control {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            margin-bottom: 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 0; /* Sharp edges for a broadcast look */
            color: #000;
            background-color: #fff;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #000; /* Sharp black focus */
            box-shadow: none;
        }
        label {
            font-weight: 800;
            color: #111;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
        .helptext, .errorlist {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: -1rem;
            margin-bottom: 0.75rem;
            display: block;
            font-weight: 600;
        }
        .errorlist { color: #dc2626; }
    </style>
</head>
<body class="bg-gray-100 text-black font-sans min-h-screen flex flex-col">
<!-- Navbar (Premium Black & Purple) -->
<nav class="bg-black text-white border-b-4 border-purple-700 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
            <div class="flex-shrink-0 font-black text-3xl tracking-widest italic">
                <a href="{% url 'index' %}" class="hover:text-purple-400 transition-colors">PRO<span class="text-purple-500">TALENT</span></a>
            </div>
            <div class="hidden md:flex items-center space-x-6">
                {% if user.is_authenticated %}
                <span class="text-gray-400 text-xs font-bold uppercase tracking-widest mr-2">Admin: {{ user.username }}</span>

                <!-- ONLY Superusers will see this link now -->
                {% if user.is_superuser %}
                <a href="{% url 'super_admin_dashboard' %}" class="text-sm font-bold uppercase tracking-wider text-purple-400 hover:text-white transition-colors">Directory</a>
                {% endif %}

                <a href="{% url 'dashboard' %}" class="text-sm font-bold uppercase tracking-wider hover:text-purple-400 transition-colors">Dashboard</a>
                <a href="{% url 'academy_add' %}" class="bg-purple-700 text-white px-5 py-2.5 text-xs font-black uppercase tracking-widest hover:bg-purple-600 transition-colors">+ Academy</a>
                <a href="{% url 'player_add' %}" class="bg-white text-black px-5 py-2.5 text-xs font-black uppercase tracking-widest hover:bg-gray-200 transition-colors">+ Player</a>

                <!-- Logout Form -->
                <form method="post" action="{% url 'logout' %}" class="inline ml-2">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-bold uppercase tracking-wider text-gray-400 hover:text-white transition-colors">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'index' %}" class="text-sm font-bold uppercase tracking-wider hover:text-purple-400 transition-colors">Home</a>
                <a href="{% url 'login' %}" class="text-sm font-bold uppercase tracking-wider hover:text-purple-400 transition-colors">Login</a>
                <a href="{% url 'register' %}" class="bg-white text-black px-6 py-2.5 text-xs font-black uppercase tracking-widest hover:bg-gray-200 transition-colors">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer class="bg-black text-white text-center py-8 mt-auto border-t border-gray-800">
    <p class="text-xs font-bold uppercase tracking-widest text-gray-500">&copy; 2026 Rapcio Fairplay Platform</p>
</footer>
</body>
</html>
