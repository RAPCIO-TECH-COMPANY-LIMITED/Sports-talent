{% extends 'talent/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow-lg p-8 border-t-4 border-black">
  <h2 class="text-2xl font-bold text-black mb-4">Confirm Deletion</h2>

  <p class="text-gray-700 text-lg mb-6">
    Are you sure you want to completely remove <span class="font-bold text-purple-700">{{ object.first_name }} {{ object.last_name }}</span> from the database?
    <br><br>
    <span class="text-sm font-semibold text-red-600">Warning: This action cannot be undone.</span>
  </p>

  <form method="post">
    {% csrf_token %}
    <div class="flex justify-end space-x-4">
      <a href="{% url 'dashboard' %}" class="px-4 py-2 border border-gray-300 rounded-md text-black hover:bg-gray-100 transition">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-bold shadow transition">Yes, Delete Player</button>
    </div>
  </form>
</div>
{% endblock %}
