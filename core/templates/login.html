{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] px-4">

    <!-- Premium Login Card (Sky Sports Aesthetic) -->
    <div class="w-full max-w-lg bg-white shadow-2xl overflow-hidden border-t-8 border-purple-700">

        <!-- Brand Header Section -->
        <div class="bg-black p-8 text-center">
            <h2 class="text-4xl font-black text-white tracking-widest uppercase italic">PRO<span class="text-purple-500">TALENT</span></h2>
            <span class="text-gray-400 text-xs font-bold tracking-[0.2em] uppercase mt-2 block">Admin Secure Login</span>
        </div>

        <!-- Form Section -->
        <div class="p-8 md:p-12 bg-gray-50">
            <h3 class="text-2xl font-black text-gray-900 mb-8 text-center uppercase tracking-tight border-b-2 border-gray-200 pb-4">Sign In</h3>

            <form method="post">
                {% csrf_token %}

                <!-- Styled Django Form Wrapper: Forces Black Borders and Large Inputs -->
                <div class="text-gray-900 [&_p]:mb-6 [&_label]:block [&_label]:font-black [&_label]:uppercase [&_label]:tracking-wider [&_label]:text-sm [&_label]:mb-2 [&_input]:w-full [&_input]:border-2 [&_input]:border-black [&_input]:p-4 [&_input]:text-lg [&_input]:font-bold [&_input]:bg-white [&_input]:focus:outline-none [&_input]:focus:border-purple-700 [&_input]:focus:ring-2 [&_input]:focus:ring-purple-700 [&_input]:transition-colors">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="w-full py-4 mt-4 bg-purple-700 hover:bg-black text-white font-black text-lg uppercase tracking-widest transition-colors duration-300 border-2 border-purple-700 hover:border-black">
                    Sign In Now
                </button>
                <input type="hidden" name="next" value="{% url 'dashboard' %}" />
            </form>

            <div class="mt-10 text-center">
                <p class="text-sm text-gray-500 font-bold uppercase tracking-wide">
                    Don't have an account?
                    <br class="mb-3 block">
                    <a href="{% url 'register' %}" class="text-black hover:text-purple-700 transition-colors border-b-2 border-black hover:border-purple-700 pb-1">
                        Register Here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
