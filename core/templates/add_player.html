{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8 border-t-4 border-black">
  <h2 class="text-2xl font-bold text-black mb-6">
    {% if object %}Edit Player: <span class="text-purple-700">{{ object.first_name }}</span>{% else %}Add New Player{% endif %}
  </h2>

  <form method="post" class="space-y-2">
    {% csrf_token %}

    <!-- Render the form fields generated by Django -->
    <div class="text-gray-800">
      {{ form.as_p }}
    </div>

    <div class="flex justify-end space-x-4 pt-4 mt-6 border-t border-gray-200">
      <a href="{% url 'dashboard' %}" class="px-4 py-2 border border-gray-300 rounded-md text-black hover:bg-gray-100 transition">Cancel</a>
      <button type="submit" class="px-4 py-2 bg-purple-700 text-white rounded-md hover:bg-purple-800 font-bold shadow transition">
        {% if object %}Save Changes{% else %}Add Player{% endif %}
      </button>
    </div>
  </form>
</div>
{% endblock %}
